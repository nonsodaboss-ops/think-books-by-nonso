<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Books - Think Books</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
    .navbar {
      background: #222; padding: 10px 0; margin-bottom: 30px; text-align: center;
    }
    .navbar a {
      color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 16px;
    }
    .navbar a:hover { text-decoration: underline; }
    ul { list-style-type: none; padding: 0; }
    li.book-card {
      background: #fff; margin: 15px 0; padding: 15px; border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s;
    }
    li.book-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
    .actions { margin-top: 10px; }
    button {
      margin-right: 8px; padding: 5px 12px; cursor: pointer; border-radius: 5px; border: none;
      background: linear-gradient(135deg,#007bff,#00c6ff); color: #fff; transition: all 0.2s ease;
    }
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="text"] { margin-top: 5px; padding: 5px; width: 50%; }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="/">Home</a>
    <a href="/register.html">Register</a>
    <a href="/login.html">Login</a>
    <a href="/recommend.html">Recommend</a>
    <a href="/search.html">Search</a>
    <a href="/feed.html">My Feed</a>
  </div>

  <h2>Search Books</h2>
  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Search by title or author" required>
    <button type="submit">Search</button>
  </form>

  <ul id="searchResults">
    <li>Enter a search term to find books.</li>
  </ul>

  <script>
    const currentUserId = localStorage.getItem("userId");

    function renderBook(book) {
      const list = document.getElementById("searchResults");
      const li = document.createElement("li");
      li.className = "book-card";

      const title = document.createElement("div");
      title.innerHTML = `<strong>${book.title}</strong> by ${book.author}`;
      li.appendChild(title);

      const recommended = document.createElement("div");
      recommended.textContent = `Recommended by: ${book.recommendedByName || "Unknown"}`;
      li.appendChild(recommended);

      // Likes
      const actions = document.createElement("div");
      actions.className = "actions";
      const likesSpan = document.createElement("span");
      likesSpan.id = `likes-${book._id}`;
      likesSpan.textContent = book.likes ? book.likes.length : 0;
      actions.appendChild(document.createTextNode("Likes: "));
      actions.appendChild(likesSpan);
      li.appendChild(actions);

      // Comments count
      const commentsSpan = document.createElement("span");
      commentsSpan.id = `comments-count-${book._id}`;
      commentsSpan.textContent = book.comments ? book.comments.length : 0;
      actions.appendChild(document.createTextNode(" Comments: "));
      actions.appendChild(commentsSpan);

      list.appendChild(li);
    }

    async function searchBooks(query) {
      const list = document.getElementById("searchResults");
      list.innerHTML = "<li>Searching...</li>";

      try {
        const res = await fetch(`/api/books/search?q=${encodeURIComponent(query)}`);
        if (!res.ok) throw new Error("Failed to fetch books");

        const books = await res.json();
        list.innerHTML = "";

        if (!books.length) {
          list.innerHTML = "<li>No matching books found.</li>";
          return;
        }

        books.forEach(renderBook);
      } catch (err) {
        list.innerHTML = `<li style="color:red">Error: ${err.message}</li>`;
      }
    }

    document.getElementById("searchForm").addEventListener("submit", e => {
      e.preventDefault();
      const query = document.getElementById("searchInput").value.trim();
      if (query) searchBooks(query);
    });
  </script>
</body>
</html>
